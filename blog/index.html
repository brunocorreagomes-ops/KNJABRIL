    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('blog-posts-grid');
            const posts = Array.from(document.querySelectorAll('.blog-post'));
            const filterBtns = document.querySelectorAll('.filter-btn');
            const sortSelect = document.getElementById('sort-date');

            function updateGrid() {
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                const sortOrder = sortSelect.value;

                // Filter
                let filteredPosts = posts.filter(post => {
                    const category = post.dataset.category;
                    return activeFilter === 'all' || category === activeFilter;
                });

                // Sort
                filteredPosts.sort((a, b) => {
                    const dateA = new Date(a.dataset.date);
                    const dateB = new Date(b.dataset.date);
                    return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
                });

                // Clear and Re-append
                grid.innerHTML = '';
                filteredPosts.forEach(post => {
                    post.classList.remove('hidden', 'active');
                    grid.appendChild(post);
                    // Re-trigger reveal animation
                    setTimeout(() => post.classList.add('active'), 50);
                });
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateGrid();
                });
            });

            sortSelect.addEventListener('change', updateGrid);

            // Initial Update to apply default sorting (newest)
            updateGrid();
        });
    </script>
